name: Build macOS App

on: 
  # This lets you trigger the build manually from the GitHub website
  workflow_dispatch: 

jobs:
  build-mac:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Matches your local environment

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # Assuming you have a requirements.txt. If not, explicitly pip install PyQt6, google-auth, supabase, etc. here.
          pip install -r requirements.txt 

      - name: Build with PyInstaller
        run: |
          pyinstaller ScreenBreak.spec

      - name: Zip the .app bundle (Required to preserve Mac permissions)
        run: |
          cd dist
          zip -r ScreenBreak-macOS.zip ScreenBreak.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenBreak-macOS
          path: dist/ScreenBreak-macOS.zip